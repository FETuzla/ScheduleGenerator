<nav class="navbar">
  <div class="nav-links">
    <div class="help-container">
      <button class="nav-help-btn" (click)="toggleHelp()">
        Kako koristiti?
      </button>
      <div class="help-dropdown" *ngIf="showHelp">
        <h3>Upustvo</h3>
        <ul>
          <li><strong>Dodaj:</strong> Klik na predmet kojeg želis dodati</li>
          <li><strong>Izbaci:</strong> Klik na predmet kojeg želis izbaciti</li>
          <li><strong>Pregled:</strong> Možeš dodati predmete sa različitih godina</li>
          <li><strong>Preuzimanje:</strong> Možeš preuzeti kao sliku ili kao .ics file</li>
        </ul>
        <button class="close-btn" (click)="showHelp = false">Zatvori</button>
      </div>
    </div>
  </div>
  <div class="nav-brand">Generator rasporeda FET</div>
  <div class="placeholder"></div>
</nav>
<main class="content">
  <div class="choice">
    <select [(ngModel)]="selectedFirst" (ngModelChange)="onFirstChange()">
      @for (selector of firstSelectors; track selector) {
        <option [value]="selector">{{ selector }}</option>
      }
    </select>

    <select *ngIf="selectedFirst !== 'BMI'" [(ngModel)]="selectedSecond">
      @for (option of secondSelectors; track option) {
        <option [value]="option">{{ option }}</option>
      }
    </select>
  </div>

  <div class="custom_schedule">
    <app-schedule 
      [schedule]="schedule" 
      (lectureSelected)="addLectureToCustom($event)">
    </app-schedule>
  </div>
  
  <div class="custom_schedule">
    <app-custom-schedule 
      #customScheduleComponent
      (lectureClicked)="onLectureClick($event)">
    </app-custom-schedule>
  </div>
</main>
<footer>
  Community project by FET students
</footer>
