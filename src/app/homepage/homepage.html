<main class="content">
  <div class="choice">
		<select [(ngModel)]="selectedFirst" (ngModelChange)="onFirstChange()">
      @for (selector of firstSelectors; track selector) {
        <option [value]="selector">
          {{ selector }}
        </option>
      }
    </select>

    <select *ngIf="selectedFirst !== 'BMI'" [(ngModel)]="selectedSecond">
      @for (option of secondSelectors; track option) {
        <option [value]="option">
          {{ option }}
        </option>
      }
    </select>
  </div>
  <app-schedule [schedule]="schedule"></app-schedule>

  <div class="table">TABELA2</div>
</main>
