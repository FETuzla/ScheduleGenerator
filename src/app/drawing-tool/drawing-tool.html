<div class="canvas-container">
  <canvas #scheduleCanvas></canvas>
</div>
@if (showSaveButton) {
  <div class="canvas-buttons">
    <button type="button" (click)="saveCanvas()">Save Image</button>
    <button type="button" (click)="generateIcs()">Export to calendar</button>
    <button type="button" (click)="openExamCalendar()">
      Open Exam Calendar
    </button>
  </div>
}
